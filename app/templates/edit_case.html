{% extends "base.html" %}
{% block content %}
<h2>Edit Case</h2>
<div class="card">
  <form method="post">
    <label>Case Name</label>
    <input name="name" required value="{{ case.name }}">
    <label>Description</label>
    <textarea name="description" rows="3">{{ case.description or '' }}</textarea>
    <label>Incident Type</label>
    <select name="incident_type">
      <option value="phishing" {% if case.incident_type == 'phishing' %}selected{% endif %}>Phishing</option>
      <option value="malware_c2" {% if case.incident_type == 'malware_c2' %}selected{% endif %}>Malware / C2</option>
      <option value="data_breach" {% if case.incident_type == 'data_breach' %}selected{% endif %}>Data Breach / Exfiltration</option>
      <option value="unauthorized_access" {% if case.incident_type == 'unauthorized_access' %}selected{% endif %}>Unauthorized Access</option>
      <option value="dos" {% if case.incident_type == 'dos' %}selected{% endif %}>Denial of Service</option>
      <option value="other" {% if case.incident_type == 'other' %}selected{% endif %}>Other</option>
    </select>
    <label>Lead Investigator</label>
    <input name="investigator" value="{{ case.investigator or '' }}">
    <label>Suspect(s)</label>
    <textarea name="suspect" rows="2" placeholder="Name, alias, or description of person(s) suspected (if known)">{{ case.suspect or '' }}</textarea>
    <label>Affected Party / Victim(s)</label>
    <textarea name="affected_party" rows="2" placeholder="Person, organization, or system affected by the incident">{{ case.affected_party or '' }}</textarea>
    <label>Status</label>
    <select name="status">
      <option value="open" {% if case.status == 'open' %}selected{% endif %}>Open</option>
      <option value="closed" {% if case.status == 'closed' %}selected{% endif %}>Closed</option>
      <option value="archived" {% if case.status == 'archived' %}selected{% endif %}>Archived</option>
    </select>
    <div style="display:flex; gap:8px;">
      <button class="btn" type="submit">Save Changes</button>
      <a class="btn-outline" href="{{ url_for('main.view_case', case_id=case.id) }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
